        let currentLang = 'th';
        let currentChapter = '';
        let currentQuestionIndex = 0;
        let totalScore = 0;

        function changeLanguage(lang) {
            if(!translations[lang]) return;
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active-lang'));
            document.getElementById('lang-' + lang).classList.add('active-lang');
            
            document.querySelectorAll('[data-key]').forEach(elem => {
                const key = elem.getAttribute('data-key');
                if (translations[lang][key]) elem.innerText = translations[lang][key];
            });
            if(currentChapter) updateQuizPageLabels();
        }

        function navigateTo(pageId) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        function startQuiz(chapterKey) {
            currentChapter = chapterKey;
            currentQuestionIndex = 0;
            totalScore = 0;
            navigateTo('quiz-page');
            updateQuizPageLabels();
            loadQuestion();
        }

        function updateQuizPageLabels() {
            const chTitle = translations[currentLang][currentChapter] || currentChapter;
            document.getElementById('quiz-chapter-title').innerText = chTitle;
        }

        function loadQuestion() {
            const questions = quizDatabase[currentChapter];
            if(!questions || currentQuestionIndex >= questions.length) {
                showFinalScore();
                return;
            }
            
            const qData = questions[currentQuestionIndex];
            document.getElementById('q-text').innerText = `Q${currentQuestionIndex + 1}: ${qData.q}`;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            document.getElementById('quiz-result').innerText = '';
            document.getElementById('btn-next').style.display = 'none';
            document.getElementById('btn-submit').disabled = false;

            qData.options.forEach((opt, idx) => {
                const label = document.createElement('label');
                label.className = 'quiz-option';
                label.innerHTML = `<input type="radio" name="dynamic-opt" value="${idx}"> ${opt}`;
                optionsContainer.appendChild(label);
            });
        }

        function submitAnswer() {
            const selected = document.querySelector('input[name="dynamic-opt"]:checked');
            const resElem = document.getElementById('quiz-result');
            if(!selected) {
                resElem.innerText = translations[currentLang].alert_select;
                resElem.style.color = "#ffc107";
                return;
            }

            document.getElementById('btn-submit').disabled = true;
            const answerIdx = parseInt(selected.value);
            const correctIdx = quizDatabase[currentChapter][currentQuestionIndex].target;

            if(answerIdx === correctIdx) {
                resElem.innerText = translations[currentLang].correct_msg;
                resElem.style.color = "#28a745";
                totalScore++;
            } else {
                resElem.innerText = translations[currentLang].wrong_msg;
                resElem.style.color = "#dc3545";
            }
            
            document.getElementById('btn-next').style.display = 'block';
        }

        function loadNextQuestion() {
            currentQuestionIndex++;
            loadQuestion();
        }

        function showFinalScore() {
            navigateTo('score-page');
            const maxScore = quizDatabase[currentChapter].length;
            document.getElementById('final-score').innerText = `${totalScore} / ${maxScore}`;
        }
    </script>
</body>
</html>
